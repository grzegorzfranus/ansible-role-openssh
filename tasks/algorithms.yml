---
# =============================================================================
# Ansible Role: OpenSSH - Tasks: Algorithms
# =============================================================================
# Detect supported algorithms on target and compute effective lists.
# =============================================================================

# Justification: Use command module because retrieving the target SSH client version
# requires invoking the 'ssh -V' command, which has no native Ansible module.
- name: OpenSSH | algorithms | Detect OpenSSH version
  ansible.builtin.command: ssh -V
  register: __openssh_version_raw
  changed_when: false
  failed_when: false
  check_mode: false

# Parse version from stderr (ssh -V outputs to stderr), e.g. "OpenSSH_8.7p1" → "8.7"
- name: OpenSSH | algorithms | Set OpenSSH version fact
  ansible.builtin.set_fact:
    __openssh_version: >-
      {{ (__openssh_version_raw.stderr | default(''))
         | regex_search('OpenSSH_(\d+\.\d+)', '\1')
         | default(['0.0'], true) | first }}

# ChallengeResponseAuthentication deprecated in OpenSSH 8.7 (bz#3303),
# replaced by KbdInteractiveAuthentication
- name: OpenSSH | algorithms | Set kbd-interactive authentication directive
  ansible.builtin.set_fact:
    __openssh_kbd_interactive_directive: >-
      {{ 'KbdInteractiveAuthentication' if (__openssh_version is version('8.7', '>=')) else 'ChallengeResponseAuthentication' }}

# Justification: Use command module because querying the client's supported ciphers
# requires running 'ssh -Q cipher', which has no native Ansible module.
- name: OpenSSH | algorithms | Query supported ciphers
  ansible.builtin.command: ssh -Q cipher
  register: __openssh_sshd_ciphers
  changed_when: false
  failed_when: false
  check_mode: false

# Justification: Use command module because querying the client's supported MACs
# requires running 'ssh -Q mac', which has no native Ansible module.
- name: OpenSSH | algorithms | Query supported MACs
  ansible.builtin.command: ssh -Q mac
  register: __openssh_sshd_macs
  changed_when: false
  failed_when: false
  check_mode: false

# Justification: Use command module because querying the client's supported KEX algorithms
# requires running 'ssh -Q kex', which has no native Ansible module.
- name: OpenSSH | algorithms | Query supported KEX algorithms
  ansible.builtin.command: ssh -Q kex
  register: __openssh_sshd_kex
  changed_when: false
  failed_when: false
  check_mode: false

# Justification: Use command module because querying the client's supported host key algorithms
# requires running 'ssh -Q key', which has no native Ansible module.
- name: OpenSSH | algorithms | Query supported hostkey algorithms
  ansible.builtin.command: ssh -Q key
  register: __openssh_sshd_hostkeys
  changed_when: false
  failed_when: false
  check_mode: false

- name: OpenSSH | algorithms | Compute effective algorithm lists
  ansible.builtin.set_fact:
    openssh_effective_ciphers: >-
      {{ openssh_ciphers | select('in', (__openssh_sshd_ciphers.stdout_lines | default([]))) | list }}
    openssh_effective_macs: >-
      {{ openssh_macs | select('in', (__openssh_sshd_macs.stdout_lines | default([]))) | list }}
    openssh_effective_kex_algorithms: >-
      {{ openssh_kex_algorithms | select('in', (__openssh_sshd_kex.stdout_lines | default([]))) | list }}
    openssh_effective_host_key_algorithms: >-
      {{ openssh_host_key_algorithms | select('in', (__openssh_sshd_hostkeys.stdout_lines | default([]))) | list }}
