---
# Prerequisites — verify system state before installation and configuration.

- name: OpenSSH | prerequisites | Set fact for check mode status
  ansible.builtin.set_fact:
    __openssh_check_mode: "{{ ansible_check_mode }}"

- name: OpenSSH | prerequisites | Check if OpenSSH package is installed
  become: true
  ansible.builtin.package_facts:
    manager: auto

- name: OpenSSH | prerequisites | Set fact for OpenSSH package status
  ansible.builtin.set_fact:
    __openssh_server_installed: "{{ ('openssh-server' in ansible_facts.packages) or ('openssh' in ansible_facts.packages) }}"

- name: OpenSSH | prerequisites | Gather service facts
  ansible.builtin.service_facts:

- name: OpenSSH | prerequisites | Set fact for OpenSSH service status
  ansible.builtin.set_fact:
    __openssh_service_active: "{{ (ansible_facts.services['ssh.service'] is defined and ansible_facts.services['ssh.service'].state == 'running') or
                                (ansible_facts.services['sshd.service'] is defined and ansible_facts.services['sshd.service'].state == 'running') }}"

- name: OpenSSH | prerequisites | Check if sshd_config.d directory exists
  ansible.builtin.stat:
    path: "{{ openssh_sshd_config_dir }}"
  register: __openssh_config_dir_stat

- name: OpenSSH | prerequisites | Create sshd_config.d directory if it doesn't exist
  become: true
  ansible.builtin.file:
    path: "{{ openssh_sshd_config_dir }}"
    state: directory
    mode: '0755'
    owner: "root"
    group: "root"
  when: >
    not __openssh_config_dir_stat.stat.exists
