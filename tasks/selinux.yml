---
# SELinux configuration — applies SELinux policies for OpenSSH if SELinux is active.

- name: "OpenSSH | selinux | Set default SELinux mode to disabled"
  ansible.builtin.set_fact:
    __openssh_selinux_mode: false

- name: "OpenSSH | selinux | Get getenforce binary of SELinux"
  ansible.builtin.stat:
    path: /usr/sbin/getenforce
  register: __openssh_getenforce_bin

- name: "OpenSSH | selinux | Collect getenforce output of SELinux"
  ansible.builtin.command: /usr/sbin/getenforce
  register: __openssh_sestatus
  when: >
    __openssh_getenforce_bin.stat.exists
  changed_when: false
  check_mode: false

- name: "OpenSSH | selinux | Set SELinux mode fact if Enforcing or Permissive"
  ansible.builtin.set_fact:
    __openssh_selinux_mode: true
  when: >
    __openssh_getenforce_bin.stat.exists and
    ("Enforcing" in __openssh_sestatus.stdout or "Permissive" in __openssh_sestatus.stdout)

- name: "OpenSSH | selinux | Install SELinux management packages (RedHat)"
  become: true
  ansible.builtin.package:
    name:
      - policycoreutils
      - policycoreutils-python-utils
      - selinux-policy-targeted
    state: present
  when: >
    __openssh_selinux_mode | default(false) and
    (ansible_facts['os_family'] | lower == 'redhat')

- name: "OpenSSH | selinux | Install SELinux management packages (Debian)"
  become: true
  ansible.builtin.package:
    name:
      - policycoreutils
      - policycoreutils-python-utils
    state: present
  when: >
    __openssh_selinux_mode | default(false) and
    (ansible_facts['os_family'] | lower == 'debian')

- name: "OpenSSH | selinux | Apply SELinux policies for OpenSSH"
  when: >
    __openssh_selinux_mode | default(false)
  block:

    - name: "OpenSSH | selinux | Ensure SELinux file context for SSH configuration"
      become: true
      community.general.sefcontext:
        target: "/etc/ssh(/.*)?"
        setype: ssh_config_t
        state: present

    - name: "OpenSSH | selinux | Check if restorecon would change contexts (dry-run)"
      become: true
      ansible.builtin.command:
        cmd: restorecon -irn /etc/ssh
      register: __openssh_restorecon_check
      changed_when: __openssh_restorecon_check.stdout is defined and __openssh_restorecon_check.stdout | length > 0
      check_mode: false

    # Only run restorecon if dry-run detected pending changes
    - name: "OpenSSH | selinux | Restore SELinux contexts for SSH configuration"
      become: true
      ansible.builtin.command:
        cmd: restorecon -irv /etc/ssh
      register: __openssh_restorecon_result
      when: >
        __openssh_restorecon_check.stdout is defined and
        __openssh_restorecon_check.stdout | length > 0
      changed_when: >
        __openssh_restorecon_result.stdout is defined and
        __openssh_restorecon_result.stdout | length > 0

    # SELinux booleans — values driven by defaults variables
    - name: "OpenSSH | selinux | Set security-focused SELinux booleans for OpenSSH"
      become: true
      ansible.posix.seboolean:
        name: "{{ item.name }}"
        state: "{{ 'yes' if item.value else 'no' }}"
        persistent: true
      loop:
        - { name: "ssh_chroot_rw_homedirs", value: "{{ openssh_selinux_chroot_rw_homedirs }}" }
        - { name: "ssh_sysadm_login", value: "{{ openssh_selinux_sysadm_login }}" }

    - name: "OpenSSH | selinux | Allow non-standard SSH TCP port in SELinux"
      become: true
      community.general.seport:
        ports: "{{ openssh_port }}"
        proto: tcp
        setype: ssh_port_t
        state: present
      when: >
        openssh_port | int != 22
