---
# Default variables for the OpenSSH role.
# Override these in your playbook or inventory. Security-hardened defaults.

# --- General Settings ---

# Which parts of the role to execute: 'all', 'install', 'config'
openssh_role_action: "all"

# Enable/disable SSH service on boot
openssh_service_enabled: true

# Require explicit opt-in to stop/disable SSH over an SSH connection
openssh_allow_service_stop: false

# --- SSH Server Settings ---

openssh_sshd_config_path: "/etc/ssh/sshd_config"
openssh_sshd_config_dir: "/etc/ssh/sshd_config.d"
openssh_sshd_validate_command: '/usr/sbin/sshd -t -f %s'
openssh_port: 22
openssh_listen_addresses: []

# Forwarding — all disabled by default for security
openssh_tcp_forwarding: false
openssh_agent_forwarding: false
openssh_x11_forwarding: false
openssh_permit_tunnel: false
openssh_gateway_ports: "no"  # tri-state: 'yes', 'no', 'clientspecified'
openssh_disable_forwarding: true

# Banner and MOTD
openssh_print_motd: true
openssh_print_last_log: true
openssh_banner_path: "/etc/issue.net"

# Session timeout (seconds)
openssh_client_alive_interval: 180
openssh_client_alive_count_max: 2

# Connection limits
openssh_max_sessions: 5
# Format: start:rate:full
openssh_max_startups: "10:30:60"

# --- Authentication Settings ---

openssh_permit_root_login: "no"
openssh_permit_empty_passwords: false
openssh_password_authentication: false
openssh_pubkey_authentication: true
openssh_host_based_auth: false
openssh_ignore_rhosts: true

# KbdInteractiveAuthentication (renamed from ChallengeResponseAuthentication,
# deprecated in OpenSSH 8.7, bz#3303)
openssh_kbd_interactive_auth: false

# Kerberos
openssh_kerberos_auth: false
openssh_kerberos_ticket_cleanup: true

# GSSAPI
openssh_gssapi_auth: false
openssh_gssapi_cleanup_credentials: true

openssh_permit_user_environment: false

# Access control lists (empty = no restriction)
openssh_allow_users: []
openssh_allow_groups: []
openssh_deny_users: []
openssh_deny_groups: []

openssh_authorized_keys_file: ".ssh/authorized_keys"
openssh_max_auth_tries: 3

# --- Network Settings ---

openssh_use_dns: false
openssh_address_family: "any"  # 'inet', 'inet6', 'any'
openssh_accept_env: ["LANG", "LC_*"]

# --- Security Settings ---

openssh_strict_modes: true

# Only modern, secure ciphers
openssh_ciphers:
  - "chacha20-poly1305@openssh.com"
  - "aes256-gcm@openssh.com"
  - "aes128-gcm@openssh.com"

# Only ETM (encrypt-then-MAC) variants
openssh_macs:
  - "hmac-sha2-512-etm@openssh.com"
  - "hmac-sha2-256-etm@openssh.com"

# Only modern key exchange algorithms
openssh_kex_algorithms:
  - "curve25519-sha256@libssh.org"
  - "curve25519-sha256"
  - "diffie-hellman-group16-sha512"
  - "diffie-hellman-group18-sha512"

# Host key algorithms — prioritize ED25519
openssh_host_key_algorithms:
  - "ssh-ed25519"
  - "rsa-sha2-512"
  - "rsa-sha2-256"

openssh_host_keys:
  - "/etc/ssh/ssh_host_rsa_key"
  - "/etc/ssh/ssh_host_ed25519_key"

openssh_compression: "no"  # 'yes', 'no', 'delayed'
openssh_login_grace_time: 60
openssh_use_pam: true

# SELinux booleans for OpenSSH
openssh_selinux_chroot_rw_homedirs: false
openssh_selinux_sysadm_login: false

# --- Logging Settings ---

openssh_log_level: "VERBOSE"  # QUIET, FATAL, ERROR, INFO, VERBOSE, DEBUG, DEBUG1-3
openssh_syslog_facility: "AUTH"

# --- SSH Client Settings ---

openssh_configure_client: true
openssh_ssh_config_path: "/etc/ssh/ssh_config"

openssh_client_settings:
  connection_attempts: 2
  connect_timeout: 10
  server_alive_interval: 180
  server_alive_count_max: 2
  check_host_ip: true
  strict_host_key_checking: "yes"
  update_host_keys: "yes"
  verify_host_key_dns: "yes"
  forward_agent: false
  forward_x11: false
  global_known_hosts_file: "/etc/ssh/ssh_known_hosts"
  user_known_hosts_file: "~/.ssh/known_hosts"
  send_env: ["LANG", "LC_*"]

# --- Custom Settings ---
# Additional sshd_config lines appended at the end of the configuration file
openssh_custom_options: []
