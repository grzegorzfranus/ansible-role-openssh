---
# Handlers are triggered by 'notify: restart openssh' in tasks.
# The service_enabled guard prevents restarting a deliberately disabled service.

- name: OpenSSH | handlers | Restart OpenSSH service
  become: true
  ansible.builtin.service:
    name: "{{ openssh_service_name }}"
    state: restarted
  when: openssh_service_enabled | bool
  listen: "restart openssh"
